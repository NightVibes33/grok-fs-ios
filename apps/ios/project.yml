name: GrokFS
options:
  bundleIdPrefix: dev.grokfs
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
targets:
  GrokFS:
    type: application
    platform: iOS
    sources:
      - Sources/GrokFS
    resources:
      - Sources/GrokFS/Resources
    info:
      path: Sources/GrokFS/Info.plist
      properties:
        CFBundleDisplayName: GrokFS
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "2"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.grokfs.mobile
        PRODUCT_NAME: GrokFS
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        LIBRARY_SEARCH_PATHS: "$(inherited) $(SRCROOT)/GeneratedRuntime/ios-device"
        OTHER_LDFLAGS: "$(inherited) -lgrokfs_ish_bridge -lc++ -lsqlite3"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) GROKFS_EMBEDDED_ISH"
        ENABLE_DEBUG_DYLIB: NO
  GrokFSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/GrokFSTests
    dependencies:
      - target: GrokFS
