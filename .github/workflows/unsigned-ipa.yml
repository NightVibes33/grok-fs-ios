name: Unsigned IPA

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GROK_ENGINE_URL: https://github.com/NightVibes33/grok-fs-ios/releases/download/engine-b189869b/grok-aarch64-musl
  GROK_ENGINE_SHA256: cd937a9297fe7e73ed61941d0bcf7db7bc84409e4d38bf09232b4b40c231ead9

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
      - name: Embed pinned Grok Build engine
        run: |
          curl --fail --location --retry 3 "$GROK_ENGINE_URL" --output /tmp/grok-aarch64-musl
          echo "$GROK_ENGINE_SHA256  /tmp/grok-aarch64-musl" | shasum -a 256 --check
          scripts/prepare-grok-rootfs.sh apps/ios/Sources/GrokFS/Resources/fs.tar.gz /tmp/grok-aarch64-musl /tmp/fs-with-grok.tar.gz
          mv /tmp/fs-with-grok.tar.gz apps/ios/Sources/GrokFS/Resources/fs.tar.gz
          tar -tzf apps/ios/Sources/GrokFS/Resources/fs.tar.gz | grep -qx "fs/data/usr/local/bin/grok"
      - name: Install native build tools
        run: brew install xcodegen meson ninja
      - name: Generate project
        working-directory: apps/ios
        run: xcodegen generate
      - name: Build embedded iSH bridge
        run: |
          rustup target add aarch64-apple-ios aarch64-unknown-linux-musl
          cargo build --manifest-path engine/ish-bridge/Cargo.toml --target aarch64-apple-ios --release
          mkdir -p apps/ios/GeneratedRuntime/ios-device
          cp engine/ish-bridge/target/aarch64-apple-ios/release/libgrokfs_ish_bridge.a apps/ios/GeneratedRuntime/ios-device/
      - name: Build unsigned app
        working-directory: apps/ios
        run: |
          xcodebuild build \
            -project GrokFS.xcodeproj \
            -scheme GrokFS \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

  unsigned-ipa:
    runs-on: macos-26
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
      - name: Embed pinned Grok Build engine
        run: |
          curl --fail --location --retry 3 "$GROK_ENGINE_URL" --output /tmp/grok-aarch64-musl
          echo "$GROK_ENGINE_SHA256  /tmp/grok-aarch64-musl" | shasum -a 256 --check
          scripts/prepare-grok-rootfs.sh apps/ios/Sources/GrokFS/Resources/fs.tar.gz /tmp/grok-aarch64-musl /tmp/fs-with-grok.tar.gz
          mv /tmp/fs-with-grok.tar.gz apps/ios/Sources/GrokFS/Resources/fs.tar.gz
          tar -tzf apps/ios/Sources/GrokFS/Resources/fs.tar.gz | grep -qx "fs/data/usr/local/bin/grok"
      - name: Install native build tools
        run: brew install xcodegen meson ninja
      - name: Generate project
        working-directory: apps/ios
        run: xcodegen generate
      - name: Build embedded iSH bridge
        run: |
          rustup target add aarch64-apple-ios aarch64-unknown-linux-musl
          cargo build --manifest-path engine/ish-bridge/Cargo.toml --target aarch64-apple-ios --release
          mkdir -p apps/ios/GeneratedRuntime/ios-device
          cp engine/ish-bridge/target/aarch64-apple-ios/release/libgrokfs_ish_bridge.a apps/ios/GeneratedRuntime/ios-device/
      - name: Archive unsigned
        working-directory: apps/ios
        run: |
          xcodebuild archive \
            -project GrokFS.xcodeproj \
            -scheme GrokFS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/GrokFS.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      - name: Package unsigned IPA
        working-directory: apps/ios
        run: |
          mkdir -p build/Payload
          cp -R build/GrokFS.xcarchive/Products/Applications/GrokFS.app build/Payload/
          cd build
          zip -qry GrokFS-unsigned.ipa Payload
          unzip -l GrokFS-unsigned.ipa | grep 'Payload/GrokFS.app'
          unzip -p GrokFS-unsigned.ipa Payload/GrokFS.app/fs.tar.gz | tar -tzf - | grep -qx 'fs/data/usr/local/bin/grok'
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GrokFS-unsigned-ipa-${{ github.sha }}
          path: apps/ios/build/GrokFS-unsigned.ipa

  repo-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f README.md
          test -f LICENSE
          test -f apps/ios/project.yml
          test -f .github/workflows/unsigned-ipa.yml
          ! grep -R "ghp_" -n --exclude="unsigned-ipa.yml" .
