name: Grok Engine iSH Probe

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/grok-engine-probe.yml"
      - "engine/**"
      - "ThirdParty/UPSTREAMS.md"

permissions:
  contents: read

env:
  GROK_BUILD_COMMIT: b189869b7755d2b482969acf6c92da3ecfeffd36

jobs:
  aarch64-musl:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler python3-pip
          pip3 install --user ziglang
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          targets: aarch64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: grok-build-aarch64-${{ env.GROK_BUILD_COMMIT }}
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Fetch official Grok Build
        run: |
          git clone --filter=blob:none https://github.com/xai-org/grok-build.git engine/upstream
          git -C engine/upstream checkout "$GROK_BUILD_COMMIT"
          test "$(git -C engine/upstream rev-parse HEAD)" = "$GROK_BUILD_COMMIT"
      - name: Patch sqlite-vec for musl
        working-directory: engine/upstream
        run: |
          cargo fetch --target aarch64-unknown-linux-musl
          source_file="$(find "$HOME/.cargo/registry/src" -path "*/sqlite-vec-0.1.7-alpha.2/sqlite-vec.c" -print -quit)"
          test -n "$source_file"
          sed -i -e "s/u_int8_t/uint8_t/g" -e "s/u_int16_t/uint16_t/g" -e "s/u_int64_t/uint64_t/g" "$source_file"
          ! grep -n "u_int" "$source_file"
      - name: Build headless-capable iSH binary
        working-directory: engine/upstream
        run: |
          cargo zigbuild \
            -p xai-grok-pager-bin \
            --target aarch64-unknown-linux-musl \
            --release \
            --no-default-features
      - name: Verify binary
        run: |
          binary=engine/upstream/target/aarch64-unknown-linux-musl/release/xai-grok-pager
          test -x "$binary"
          file "$binary"
          sha256sum "$binary" | tee grok-i686.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: grok-build-aarch64-musl-${{ env.GROK_BUILD_COMMIT }}
          path: |
            engine/upstream/target/aarch64-unknown-linux-musl/release/xai-grok-pager
            grok-i686.sha256
